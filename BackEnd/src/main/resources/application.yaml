spring:
  application:
    name: BackEnd
  datasource:
    url: jdbc:postgresql://localhost:5432/messenger
    username: postgres
    password: root
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.instantmessenger.backend: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG

app:
  jwt:
    secret: replace-this-dev-secret-with-a-long-random-value
    expiration-seconds: 86400
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:your-messenger-bucket}
    region: ${AWS_S3_REGION:eu-north-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    presigned-url-expiry-minutes: 5
  ses:
    region: ${AWS_SES_REGION:eu-central-1}
    from-email: ${SES_FROM_EMAIL:noreply@instant-messenger.info}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
